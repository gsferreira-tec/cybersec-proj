    #    tty: true
    #    cap_add:
    #            - ALL
    #    networks:
    #        net-10.9.0.0:
    #            ipv4_address: 10.9.0.5
    #    volumes:
    #      - ./bind/zones/db.victim.test:/etc/bind/db.victim.test:ro
    #      - ./bind/zones/db.attacker.test:/etc/bind/db.attacker.test:ro
    #    restart: always
    
    dns-server:
        build : ./bind
        image: dns-server-custom
        container_name: dns-server-10.9.0.5
        tty: true
        cap_add:
                - ALL
        networks:
            net-10.9.0.0:
                ipv4_address: 10.9.0.5
        restart: always
                  
    victim-mail:
        #image: handsonsecurity/seed-ubuntu:large
        image: mailserver/docker-mailserver:latest
        # image: mailserver/docker-mailserver:13.3.1
        container_name: victim-mail-10.9.0.6
        hostname: mail
        domainname: victim.test
        environment:
            - POSTMASTER_ADDRESS=postmaster@victim.test
            - ENABLE_SPAMASSASSIN=1
            - ENABLE_CLAMAV=0
            - ENABLE_FAIL2BAN=0

        tty: true
        cap_add:
                - ALL
        networks:
            net-10.9.0.0:
                ipv4_address: 10.9.0.6

        dns:
          - 10.9.0.5 # IP from attacker's DNS server 
        # dns_search: [] # test to solve dkim troubles...
        ports:
          - "2525:25"   # STMP
          - "1143:143"  # IMAP
        # Host ports were changed to avoid conflict

        volumes:
          - ./maildata:/tmp/docker-mailserver
          - ./ml-detector:/home/ml-detector
          - ./resolv.conf:/etc/resolv.conf:ro
          - ./unbound.conf:/etc/opendkim/unbound.conf:ro
          - ./opendkim.conf:/etc/opendkim.conf:ro
        
        #command: bash -c "/etc/init.d/postfix start && /etc/init.d/dovecot start && tail -f /dev/null"


        restart: always

    attacker-sender: 
        image: handsonsecurity/seed-ubuntu:large
        container_name: attacker-sender-10.9.0.7
        hostname: attacker
        tty: true
        cap_add:
                - ALL
        networks:
            net-10.9.0.0:
              ipv4_address: 10.9.0.7

        volumes:
          - ./espoofer/:/home/seed/espoofer
          - ./attacks/:/home/seed/attacks
          - ./init-setup/:/home/seed/init-setup

        command: bash -c "/etc/init.d/openbsd-inetd start && tail -f /dev/null"

    webmail:
        image: roundcube/roundcubemail:latest
        container_name: webmail-10.9.0.8
        networks:
            net-10.9.0.0:
                ipv4_address: 10.9.0.8
        ports:
            - "8080:80"    # access via browser at http://localhost:8080
        environment:
            - ROUNDCUBEMAIL_DEFAULT_HOST=10.9.0.6      # victim mail server
            - ROUNDCUBEMAIL_DEFAULT_PORT=143            # IMAP
            - ROUNDCUBEMAIL_SMTP_SERVER=10.9.0.6       # SMTP
            - ROUNDCUBEMAIL_SMTP_PORT=25
        depends_on:
            - victim-mail

networks:
  net-10.9.0.0:
      name: net-10.9.0.0
      # driver: bridge # test to solve dkim key troubles...
      ipam:
          config:
              - subnet: 10.9.0.0/24

