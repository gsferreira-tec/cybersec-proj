# ============================================================================
# postfix-policyd-spf-python — victim.test
#
# Advisory mode for the lab. Students see Received-SPF: fail / softfail /
# permerror / none in headers, but the policy daemon never tells Postfix
# to reject. The message lands so it can be analysed.
# ============================================================================

debugLevel = 1

# CRITICAL — must be False so SPF results are observed, not enforced.
HELO_reject       = False
Mail_From_reject  = False
PermError_reject  = False
TempError_Defer   = False

# Skip SPF for loopback. We do NOT want 10.9.0.0/24 in skip_addresses —
# the attacker at 10.9.0.7 must go through SPF policy.
skip_addresses = 127.0.0.0/8,::ffff:127.0.0.0/104,::1

# Add a Received-SPF: header to the message
Header_Type = SPF
