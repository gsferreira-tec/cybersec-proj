# ============================================================================
# OpenDMARC — victim.test
#
# Advisory mode: produces dmarc= results in Authentication-Results but
# does NOT reject. Task 4 (Defence) is where students change RejectFailures
# to 'true' to see enforcement in action.
# ============================================================================

Syslog                  true

AuthservID              mail.victim.test
TrustedAuthservIDs      mail.victim.test

# Milter socket — referenced from Postfix main.cf as inet:localhost:8893
Socket                  inet:8893@localhost

UserID                  opendmarc:opendmarc
PidFile                 /var/run/opendmarc/opendmarc.pid

# Don't reject — just stamp the verdict in the header. This is what makes
# the lab pedagogical: students can see "dmarc=fail" in inbox messages
# and discuss why the message landed anyway.
RejectFailures          false
FailureReports          false

# Don't run DMARC on locally-authenticated outbound submissions
IgnoreAuthenticatedClients true

# Where to store per-domain DMARC history (kept on tmpfs — fine for lab)
HistoryFile             /var/run/opendmarc/opendmarc.dat

# Disable the public-suffix list lookup; in a closed lab there are no
# real registered domains and the file is missing on stock seed-ubuntu.
PublicSuffixList        /usr/share/publicsuffix/public_suffix_list.dat
