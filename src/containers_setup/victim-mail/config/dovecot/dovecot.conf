# ============================================================================
# Dovecot — SEED Lab victim.test
#
# Single flat file (instead of conf.d/ fragments) to keep the lab inspectable.
# ============================================================================

protocols = imap lmtp
listen    = *
ssl       = no
disable_plaintext_auth = no
auth_mechanisms        = plain login

# ----- Mail storage ---------------------------------------------------------
# Delivered by Postfix → LMTP → here. Stored as Maildir under
# /var/mail/<user>/Maildir.  The ml-detector watches /var/mail and will
# pick up files in .../Maildir/new/ automatically.
mail_location = maildir:/var/mail/%n/Maildir
mail_uid      = vmail
mail_gid      = vmail
mail_privileged_group = vmail
first_valid_uid = 5000

# ----- Authentication -------------------------------------------------------
passdb {
  driver = passwd-file
  args   = scheme=PLAIN username_format=%n /etc/dovecot/users
}

userdb {
  driver = passwd-file
  args   = username_format=%n /etc/dovecot/users
  default_fields = uid=vmail gid=vmail home=/var/mail/%n
}

# ----- Services -------------------------------------------------------------
service auth {
  # Postfix talks to Dovecot SASL through this socket.
  # main.cf has:  smtpd_sasl_path = private/auth
  unix_listener /var/spool/postfix/private/auth {
    mode  = 0660
    user  = postfix
    group = postfix
  }
}

service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode  = 0600
    user  = postfix
    group = postfix
  }
}

service imap-login {
  inet_listener imap {
    port = 143
  }
}

# Quieter logs in the lab — but show authentication attempts
auth_verbose = yes
log_path     = /var/log/dovecot.log
